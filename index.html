<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lock.js" defer></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(60px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

.dash-title {
  margin: 0 0 20px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}

/* ===== Bento grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

.bento-tile {
  display: flex;
  flex-direction: column;
  padding: 20px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 18px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  --accent: #FAFAFA;
}
.bento-tile:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
}
.bento-tile.big  { grid-column: span 2; grid-row: span 2; }
.bento-tile.wide { grid-column: span 2; }

/* tile inner layout */
.tile-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.tile-emoji {
  font-size: 28px;
  line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
}
.bento-tile.big .tile-emoji { font-size: 44px; }

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.bento-tile.big .tile-title { font-size: 24px; margin-bottom: 8px; }

.tile-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tile-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: 0.01em;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tile-arrow {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
  transition: transform 0.18s ease;
  margin-left: 8px;
}
.bento-tile:hover .tile-arrow { transform: translateX(4px); }

/* ===== Responsive ===== */
@media (max-width: 720px) {
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .bento-tile.big { grid-row: span 1; }
  .bento-tile.big .tile-emoji { font-size: 32px; }
  .bento-tile.big .tile-title { font-size: 19px; }
}
@media (max-width: 440px) {
  .bento-grid { grid-template-columns: 1fr; gap: 10px; }
  .bento-tile.big, .bento-tile.wide { grid-column: span 1; grid-row: span 1; }
  .bento-tile.big .tile-emoji { font-size: 28px; }
  .bento-tile.big .tile-title { font-size: 17px; margin-bottom: 6px; }
}
@media (max-width: 480px) {
  .dash-title { font-size: 22px; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <!-- ·01 Main — big tile -->
    <a href="main.html" class="bento-tile big" style="--accent: #6BE3A4">
      <div class="tile-top">
        <span class="tile-num">·01</span>
        <span class="tile-emoji">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness — wide tile -->
    <a href="gym.html" class="bento-tile wide" style="--accent: #7DD3FC">
      <div class="tile-top">
        <span class="tile-num">·02</span>
        <span class="tile-emoji">💪</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·03 Health — small tile -->
    <a href="health.html" class="bento-tile" style="--accent: #A7F3D0">
      <div class="tile-top">
        <span class="tile-num">·03</span>
        <span class="tile-emoji">💊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·04 Water — small tile -->
    <a href="po-water.html" class="bento-tile" style="--accent: #60A5FA">
      <div class="tile-top">
        <span class="tile-num">·04</span>
        <span class="tile-emoji">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·05 Finance — wide tile -->
    <a href="finance.html" class="bento-tile wide" style="--accent: #F2C063">
      <div class="tile-top">
        <span class="tile-num">·05</span>
        <span class="tile-emoji">📊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
